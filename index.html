<!DOCTYPE html>
<html lang="uk">
<head>

<title>Magic Ball</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Головний екран -->
<div id="home" class="screen">

</div>

Назад
</button>

</div>

<!-- Магічна музика -->
<audio id="magicSound" src="magic.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
